name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install KAGE
        run: |
          curl -sfL https://raw.githubusercontent.com/vtino17/kage/main/scripts/install.sh | sh

      - name: Run security scan
        run: kage scan . --ci --format sarif
